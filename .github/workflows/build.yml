name: Build Release APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: Build & Sign APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.4'

      - name: Build release APK
        run: gradle assembleRelease --stacktrace

      - name: Generate signing keystore
        run: |
          keytool -genkeypair -v \
            -keystore mediaviewer-release.jks \
            -alias mediaviewer \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass mediaviewer123 \
            -keypass mediaviewer123 \
            -dname "CN=MediaViewer, OU=App, O=MediaViewer, L=Unknown, ST=Unknown, C=US"

      - name: Sign APK
        run: |
          BUILD_TOOLS=$(ls $ANDROID_HOME/build-tools | sort -V | tail -1)
          $ANDROID_HOME/build-tools/$BUILD_TOOLS/apksigner sign \
            --ks mediaviewer-release.jks \
            --ks-key-alias mediaviewer \
            --ks-pass pass:mediaviewer123 \
            --key-pass pass:mediaviewer123 \
            --out app/build/outputs/apk/release/MediaViewer-signed.apk \
            app/build/outputs/apk/release/app-release-unsigned.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: MediaViewer-APK
          path: app/build/outputs/apk/release/MediaViewer-signed.apk
          retention-days: 90
